name: StockInsight Pro CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ────────────────────────────
  # Frontend: ESLint + TypeScript
  # ────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npx eslint src/
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,css}"
      - name: TypeScript check
        run: npx tsc --noEmit

  # ────────────────────────────
  # Frontend Tests: Vitest
  # ────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npx vitest run

  # ────────────────────────────
  # Backend: Ruff + Tests
  # ────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check backend/ stock_analyzer/ --config ruff.toml
      - name: Ruff format check
        run: ruff format --check backend/ stock_analyzer/ --config ruff.toml

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov fastapi uvicorn httpx
          pip install -r requirements.txt 2>/dev/null || true
      - name: Run tests with coverage
        run: |
          python -m pytest stock_analyzer/tests/ backend/tests/ -v --tb=short \
            --cov=stock_analyzer --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=15 \
            --no-cov-on-fail

  # ────────────────────────────
  # Type Check (mypy)
  # ────────────────────────────
  backend-type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -r requirements.txt 2>/dev/null || true
      - name: Type check
        run: |
          mypy stock_analyzer/ backend/ \
            --ignore-missing-imports \
            --check-untyped-defs \
            --warn-return-any \
            --warn-redundant-casts || echo "::warning::mypy 发现类型提示问题（非阻塞）"

  # ────────────────────────────
  # Security
  # ────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Python security scan
        run: |
          pip install bandit
          bandit -r backend/ stock_analyzer/ -ll --skip B101
      - name: npm audit
        run: |
          npm ci
          npm audit --audit-level=high || true
      - name: Check for secrets
        run: |
          if grep -rn "API_KEY\s*=\s*['\"][^'\"]*['\"]" backend/ stock_analyzer/ 2>/dev/null | grep -v "None\|your_\|changeme\|example"; then
            echo "::warning::Possible hardcoded API key detected"
          fi
          echo "Secret scan complete"
