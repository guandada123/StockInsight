[tool.mypy]
python_version = "3.11"
# 渐进式类型检查——当前为宽松模式，逐步收紧
strict = false
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
check_untyped_defs = true
no_implicit_optional = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "stock_analyzer.*",
    "backend.routers.*",
]
disallow_untyped_defs = false
warn_unused_ignores = true

[tool.ruff]
# Ruff config is in ruff.toml — this section ensures pyproject.toml compatibility
