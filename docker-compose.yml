version: "3.8"

services:
  api:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./stock_cache.db:/app/stock_cache.db
      - ./logs:/app/logs
      - ./portfolios:/app/portfolios
    environment:
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
