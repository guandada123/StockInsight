# Pre-commit hooks — StockInsight Pro
# Install: pip install pre-commit && pre-commit install --hook-type commit-msg
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python: ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Python: mypy (type check)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args:
          - --explicit-package-bases
        additional_dependencies:
          - types-PyYAML
          - types-requests
        files: ^(backend|stock_analyzer)/.*\.py$
        pass_filenames: false

  # Frontend: ESLint + Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^src/.*\.(ts|tsx|css)$
        types_or: [ts, tsx, css]
        additional_dependencies:
          - prettier@3.3.0

  # Conventional Commits 格式校验
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commits
        entry: python scripts/check-commit-msg.py
        language: python
        stages: [commit-msg]
        always_run: true
